<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet" />
    <title>my-home</title>
  </head>
  <body
    class="max-w-[1440px] mx-auto text-neutral-900 dark:text-neutral-200 bg-white dark:bg-white"
  >
    <nav class="bg-[#A1BC98] shadow-md">
      <div class="mx-auto max-w-7xl px-4">
        <div class="relative flex h-16 items-center justify-between">
          <!-- Logo -->
          <a
            href="/"
            aria-label="Go to homepage"
            class="text-2xl font-bold text-neutral-900"
          >
            <img
              src="assets/logo.png"
              alt="home logo"
              class="w-[52px] h-[52px]"
            />
          </a>

          <!-- Mobile Toggle -->
          <input type="checkbox" id="nav-toggle" class="peer hidden" />

          <!-- Hamburger Button -->
          <label
            for="nav-toggle"
            class="cursor-pointer rounded-md p-2 hover:bg-orange-500 md:hidden"
          >
            <span class="sr-only">Open menu</span>

            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4 6h16M4 12h16M4 18h16"
              />
            </svg>
          </label>

          <!-- Desktop Navigation -->
          <ul class="hidden items-center gap-8 md:flex">
            <li>
              <a href="/" class="font-medium hover:text-[#778873] transition">
                Home
              </a>
            </li>
            <li>
              <a
                href="/about"
                class="font-medium hover:text-[#778873] transition"
              >
                About
              </a>
            </li>
            <li>
              <a
                href="/services"
                class="font-medium hover:text-[#778873] transition"
              >
                Services
              </a>
            </li>
            <li>
              <a
                href="/contact"
                class="font-medium hover:text-[#778873] transition"
              >
                Contact
              </a>
            </li>
            <li>
              <a
                href="/login"
                class="rounded-lg bg-[#A1BC98] px-4 py-2 font-medium text-[#778873] hover:bg-neutral-100"
              >
                Login
              </a>
            </li>
          </ul>

          <!-- Mobile Navigation -->
          <div
            class="absolute left-0 top-full hidden w-full bg-orange-400 shadow-lg peer-checked:block md:hidden"
          >
            <ul class="flex flex-col p-4">
              <li>
                <a href="/" class="block rounded px-4 py-3 hover:bg-orange-500">
                  Home
                </a>
              </li>
              <li>
                <a
                  href="/about"
                  class="block rounded px-4 py-3 hover:bg-orange-500"
                >
                  About
                </a>
              </li>
              <li>
                <a
                  href="/services"
                  class="block rounded px-4 py-3 hover:bg-orange-500"
                >
                  Services
                </a>
              </li>
              <li>
                <a
                  href="/contact"
                  class="block rounded px-4 py-3 hover:bg-orange-500"
                >
                  Contact
                </a>
              </li>
              <li class="mt-2">
                <a
                  href="/login"
                  class="block rounded bg-white px-4 py-3 text-center font-medium text-orange-500"
                >
                  Login
                </a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </nav>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
