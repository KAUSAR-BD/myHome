<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet" />
    <title>my-home</title>
  </head>
  <body class="max-w-[1440px] mx-auto bg-gray-50 text-gray-800">
    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-50">
      <div class="mx-auto max-w-7xl px-6">
        <div class="relative flex h-16 items-center justify-between">
          <!-- Logo -->
          <a href="/" aria-label="Homepage">
            <img
              src="assets/home-agreement.png"
              alt="logo"
              class="h-12 w-12 object-contain"
            />
          </a>

          <!-- Mobile toggle -->
          <input type="checkbox" id="nav-toggle" class="peer hidden" />

          <!-- Hamburger -->
          <label
            for="nav-toggle"
            class="cursor-pointer rounded-md p-2 text-gray-700 hover:bg-green-100 md:hidden"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4 6h16M4 12h16M4 18h16"
              />
            </svg>
          </label>

          <!-- Desktop Menu -->
           <ul class="hidden items-center gap-8 md:flex">
            <li>
              <a href="/" class="font-medium text-gray-700 hover:text-green-700 transition">Home</a>
            </li>
            <li>
              <a href="/about" class="font-medium text-gray-700 hover:text-green-700 transition">About</a>
            </li>
            <li>
              <a href="/services" class="font-medium text-gray-700 hover:text-green-700 transition">Services</a>
            </li>
            <li>
              <a href="/contact" class="font-medium text-gray-700 hover:text-green-700 transition">Contact</a>
            </li>
            <li>
              <a href="/login" class="font-medium text-gray-700 hover:text-green-700 transition">Login</a>
            </li>
           </ul>

           <!-- Mobile Menu -->
            <div class="absolute left-0 top-full hidden w-full bg-white border-t border-gray-200 shadow-lg peer-checked:block md:hidden">

              <ul class="flex flex-col p-4">
                <li>
                  <a href="/" class="block rounded-lg px-4 py-3 text-gray-700 hover:bg-green-50 hover:text-green-700">Home</a>
                </li>
                <li>
                  <a href="/about" class="block rounded-lg px-4 py-3 text-gray-700 hover:bg-green-50 hover:text-green-700">About</a>
                </li>
                <li>
                  <a href="/services" class="block rounded-lg px-4 py-3 text-gray-700 hover:bg-green-50 hover:text-green-700">Services</a>
                </li>
                <li>
                  <a href="/contact" class="block rounded-lg px-4 py-3 text-gray-700 hover:bg-green-50 hover:text-green-700">Contact</a>
                </li>
                <li class="mt-3">
                  <a href="/login" class="block rounded-lg bg-green-700 px-4 py-3 text-center font-medium text-white hover:bg-green-800">Login</a>
                </li>
              </ul>
            </div>
        </div>
      </div>
    </nav>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
